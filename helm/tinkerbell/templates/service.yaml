{{- if .Values.service.enabled }}
{{- $loadBalancerIPs := list }}
{{- $publicIP := coalesce .Values.deployment.envs.globals.publicIpv4 .Values.deployment.envs.globals.publicIPv4 .Values.publicIP }}
{{- $publicIPv6 := coalesce .Values.deployment.envs.globals.publicIpv6 .Values.deployment.envs.globals.publicIPv6 .Values.publicIPv6 }}
{{- if and $publicIP (include "tinkerbell.isIPv6Address" $publicIP) }}
  {{- fail "publicIP must be an IPv4 address; use publicIPv6 for IPv6 addresses" }}
{{- end }}
{{- if and $publicIPv6 (include "tinkerbell.isIPv4Address" $publicIPv6) }}
  {{- fail "publicIPv6 must be an IPv6 address; use publicIP for IPv4 addresses" }}
{{- end }}
{{- if $publicIP }}
{{- $loadBalancerIPs = append $loadBalancerIPs $publicIP }}
{{- end }}
{{- if $publicIPv6 }}
{{- $loadBalancerIPs = append $loadBalancerIPs $publicIPv6 }}
{{- end }}
{{- if .Values.service.loadBalancerIP }}
{{- $loadBalancerIPs = append $loadBalancerIPs .Values.service.loadBalancerIP }}
{{- end }}
{{- $loadBalancerIPs = uniq $loadBalancerIPs }}
{{- $hasKubeVIPLoadBalancerIPsAnnotation := hasKey (default dict .Values.service.annotations) "kube-vip.io/loadbalancerIPs" }}
apiVersion: v1
kind: Service
metadata:
  annotations:
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and (eq .Values.service.type "LoadBalancer") (gt (len $loadBalancerIPs) 0) (not $hasKubeVIPLoadBalancerIPsAnnotation) }}
    kube-vip.io/loadbalancerIPs: {{ join "," $loadBalancerIPs | quote }}
    {{- end }}
  labels:
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  name: {{ .Values.service.name }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  type: {{ .Values.service.type }}
  {{- if eq .Values.service.type "LoadBalancer" }}
  {{- if .Values.service.lbClass }}
  loadBalancerClass: {{ .Values.service.lbClass }}
  {{- end }}
  loadBalancerIP: {{ coalesce .Values.service.loadBalancerIP $publicIP $publicIPv6 }}
  externalTrafficPolicy: Local
  {{- end }}
  {{- if .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.service.ipFamilyPolicy }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
  {{- if .Values.deployment.envs.globals.enableSmee}}
  - port: {{ .Values.service.ports.dhcp.port }}
    targetPort: {{ .Values.service.ports.dhcp.name }}
    protocol: {{ .Values.service.ports.dhcp.protocol }}
    name: {{ .Values.service.ports.dhcp.name }}
  {{- if .Values.deployment.envs.smee.dhcpv6Enabled }}
  - port: {{ .Values.service.ports.dhcpv6.port }}
    targetPort: {{ .Values.service.ports.dhcpv6.name }}
    protocol: {{ .Values.service.ports.dhcpv6.protocol }}
    name: {{ .Values.service.ports.dhcpv6.name }}
  {{- end }}
  - port: {{ .Values.service.ports.tftp.port }}
    targetPort: {{ .Values.service.ports.tftp.name }}
    protocol: {{ .Values.service.ports.tftp.protocol }}
    name: {{ .Values.service.ports.tftp.name }}
  - port: {{ .Values.service.ports.syslog.port }}
    targetPort: {{ .Values.service.ports.syslog.name }}
    protocol: {{ .Values.service.ports.syslog.protocol }}
    name: {{ .Values.service.ports.syslog.name }}
  {{- end }}
  {{- if .Values.deployment.envs.globals.enableTinkServer }}
  - port: {{ .Values.service.ports.grpc.port }}
    targetPort: {{ .Values.service.ports.grpc.name }}
    protocol: {{ .Values.service.ports.grpc.protocol }}
    name: {{ .Values.service.ports.grpc.name }}
  {{- end}}
  {{- if .Values.deployment.envs.globals.enableSecondstar}}
  - port: {{ .Values.service.ports.ssh.port }}
    targetPort: {{ .Values.service.ports.ssh.name }}
    protocol: {{ .Values.service.ports.ssh.protocol }}
    name: {{ .Values.service.ports.ssh.name }}
  {{- end }}
  - port: {{ .Values.service.ports.http.port }} # This is always enabled because /metrics and /healthcheck are always enabled.
    targetPort: {{ .Values.service.ports.http.name }}
    protocol: {{ .Values.service.ports.http.protocol }}
    name: {{ .Values.service.ports.http.name }}
  {{- if and .Values.deployment.envs.globals.tlsCertFile .Values.deployment.envs.globals.tlsKeyFile }}
  - port: {{ .Values.service.ports.https.port }}
    targetPort: {{ .Values.service.ports.https.name }}
    protocol: {{ .Values.service.ports.https.protocol }}
    name: {{ .Values.service.ports.https.name }}
  {{- end }}
  selector:
    {{- with .Values.service.selector }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
