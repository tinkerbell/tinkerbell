{{- if or .Values.optional.hookos.enabled .Values.optional.captainos.enabled }}
# The NGINX ConfigMap is in a separate file because its checksum is used to trigger updates in
# the deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: {{ .Release.Namespace | quote }}
data:
  nginx.conf: |
    worker_processes 1;
    events {
      worker_connections  1024;
    }
    user root;
    http {
      server {
        listen {{ include "tinkerbell.osie.port" . }};
        location / {
          sendfile           on;
          sendfile_max_chunk 1m;
          {{- if and .Values.optional.hookos.enabled .Values.optional.captainos.enabled }}
          root /usr/share/nginx/html;
          try_files $uri @captain;
          {{- else if .Values.optional.captainos.enabled }}
          root /captain;
          {{- else }}
          root /usr/share/nginx/html;
          {{- end }}
        }
        {{- if and .Values.optional.hookos.enabled .Values.optional.captainos.enabled }}
        location @captain {
          sendfile           on;
          sendfile_max_chunk 1m;
          root /captain;
        }
        {{- end }}
      }
    }
{{- end }}
