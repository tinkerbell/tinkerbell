{{- if or .Values.optional.hookos.enabled .Values.optional.captainos.enabled }}
{{- if not .Values.artifactsFileServer }}
  {{- fail "artifactsFileServer must be set when an OSIE is enabled" }}
{{- else }}
{{- if ne (include "osie.hostNetwork" .) "true" }}
{{- $artifactsURL := urlParse .Values.artifactsFileServer }}
{{- $artifactsHost :=  split ":" $artifactsURL.host }}
{{- $artifactsIP := include "isIpAddress" $artifactsHost._0 }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: {{ include "osie.name" . }}
  name: {{ include "osie.name" . }}
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    {{- $annotations := include "osie.service.annotations" . }}
    {{- if $annotations }}
    {{- $annotations | nindent 4 }}
    {{- end }}
spec:
  type: {{ include "osie.service.type" . }}
  {{- if eq (include "osie.service.type" .) "LoadBalancer" }}
  {{- $lbClass := include "osie.service.lbClass" . }}
  {{- if $lbClass }}
  loadBalancerClass: {{ $lbClass }}
  {{- end }}
  loadBalancerIP: {{ coalesce $artifactsIP (include "osie.service.loadBalancerIP" .) | required "no load balancer IP specified, please specify a load balancer IP" }}
  externalTrafficPolicy: Local
  {{- end }}
  ports:
  - name: {{ include "osie.name" . }}
    port: {{ include "osie.port" . }}
    protocol: TCP
  selector:
    {{- include "osie.selector" . | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}