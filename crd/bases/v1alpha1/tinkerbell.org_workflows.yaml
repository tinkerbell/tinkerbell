              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowSpec defines the desired state of Workflow.
            properties:
              bootOptions:
                description: |-
                  BootOptions are options that control the booting of Hardware.
                  These are only applicable when a HardwareRef is provided.
                properties:
                  bootMode:
                    description: BootMode is the type of booting that will be done.
                      One of "netboot", "isoboot", or "customboot".
                    enum:
                    - netboot
                    - isoboot
                    - iso
                    - customboot
                    type: string
                  custombootConfig:
                    description: |-
                      CustombootConfig is the configuration for the "customboot" boot mode.
                      This allows users to define custom BMC Actions.
                    properties:
                      postActions:
                        description: |-
                          PostActions are the BMC actions and/or webhook calls that will be run, in order, after
                          all Workflow Actions have completed. In most cases these should get a Machine into a
                          state where it can be powered off or rebooted and remove any mounted virtual media.
                          These will be run only if the main Workflow Actions complete successfully.
                        items:
                          description: |-
                            CustombootAction is one element of PreparingActions/PostActions, executed in list order.
                            bmc.Action is embedded (not nested under a "bmcAction" key) so a pure-BMC entry is written
                            exactly as it always has been, e.g. "- powerAction: off" — only an entry that's a webhook call
                            needs the extra Webhook field. Exactly one of bmc.Action's own fields or Webhook must be set.
                          maxProperties: 1
                          properties:
                            bootDevice:
                              description: BootDevice is the device to set as the
                                first boot device on the Machine.
                              properties:
                                device:
                                  description: Device is the name of the device to
                                    set as the first boot device.
                                  type: string
                                efiBoot:
                                  description: EFIBoot indicates whether the boot
                                    device should be set to efiboot mode.
                                  type: boolean
                                persistent:
                                  description: Persistent indicates whether the boot
                                    device should be set persistently as the first
                                    boot device.
                                  type: boolean
                              type: object
                            oneTimeBootDeviceAction:
                              description: |-
                                OneTimeBootDeviceAction represents a baseboard management one time set boot device operation.

                                Deprecated: This field is deprecated and will be removed in a future release. Use bootDevice instead.
                              properties:
                                device:
                                  description: |-
                                    Devices represents the boot devices, in order for setting one time boot.
                                    Currently only the first device in the slice is used to set one time boot.
                                  items:
                                    description: BootDevice represents boot device
                                      of the Machine.
                                    type: string
                                  type: array
                                efiBoot:
                                  description: EFIBoot instructs the machine to use
                                    EFI boot.
                                  type: boolean
                              required:
                              - device
                              type: object
                            powerAction:
                              description: PowerAction represents a baseboard management
