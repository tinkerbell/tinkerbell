                              - soft
                              - status
                              - cycle
                              - reset
                              type: string
                            virtualMediaAction:
                              description: VirtualMediaAction represents a baseboard
                                management virtual media insert/eject.
                              properties:
                                kind:
                                  description: Kind represents the kind of virtual
                                    media.
                                  type: string
                                mediaURL:
                                  description: mediaURL represents the URL of the
                                    image to be inserted into the virtual media, or
                                    empty to eject media.
                                  type: string
                              required:
                              - kind
                              type: object
                            webhook:
                              description: Webhook, if set, makes this entry an HTTP
                                call instead of a BMC action.
                              properties:
                                basicAuth:
                                  description: |-
                                    BasicAuth, if set, adds an HTTP Basic Authorization header built from a Secret
                                    containing "username" and "password" keys. Takes precedence over any Headers entry
                                    named "Authorization".
                                  properties:
                                    name:
                                      description: name is unique within a namespace
                                        to reference a secret resource.
                                      type: string
                                    namespace:
                                      description: namespace defines the space within
