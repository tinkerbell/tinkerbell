                            bmc.Action is embedded (not nested under a "bmcAction" key) so a pure-BMC entry is written
                            exactly as it always has been, e.g. "- powerAction: off" — only an entry that's a webhook call
                            needs the extra Webhook field. Exactly one of bmc.Action's own fields or Webhook must be set.
                          maxProperties: 1
                          properties:
                            bootDevice:
                              description: BootDevice is the device to set as the
                                first boot device on the Machine.
                              properties:
                                device:
                                  description: Device is the name of the device to
                                    set as the first boot device.
                                  type: string
                                efiBoot:
                                  description: EFIBoot indicates whether the boot
                                    device should be set to efiboot mode.
                                  type: boolean
                                persistent:
                                  description: Persistent indicates whether the boot
                                    device should be set persistently as the first
                                    boot device.
                                  type: boolean
                              type: object
                            oneTimeBootDeviceAction:
                              description: |-
                                OneTimeBootDeviceAction represents a baseboard management one time set boot device operation.

                                Deprecated: This field is deprecated and will be removed in a future release. Use bootDevice instead.
                              properties:
                                device:
                                  description: |-
                                    Devices represents the boot devices, in order for setting one time boot.
                                    Currently only the first device in the slice is used to set one time boot.
                                  items:
                                    description: BootDevice represents boot device
                                      of the Machine.
                                    type: string
                                  type: array
                                efiBoot:
                                  description: EFIBoot instructs the machine to use
                                    EFI boot.
                                  type: boolean
                              required:
                              - device
                              type: object
                            powerAction:
                              description: PowerAction represents a baseboard management
                                power operation.
                              enum:
                              - "on"
                              - "off"
                              - soft
                              - status
                              - cycle
                              - reset
                              type: string
                            virtualMediaAction:
                              description: VirtualMediaAction represents a baseboard
                                management virtual media insert/eject.
                              properties:
                                kind:
                                  description: Kind represents the kind of virtual
                                    media.
                                  type: string
                                mediaURL:
                                  description: mediaURL represents the URL of the
                                    image to be inserted into the virtual media, or
                                    empty to eject media.
                                  type: string
                              required:
                              - kind
                              type: object
                            webhook:
                              description: Webhook, if set, makes this entry an HTTP
                                call instead of a BMC action.
                              properties:
                                basicAuth:
                                  description: |-
                                    BasicAuth, if set, adds an HTTP Basic Authorization header built from a Secret
                                    containing "username" and "password" keys. Takes precedence over any Headers entry
                                    named "Authorization".
                                  properties:
                                    name:
                                      description: name is unique within a namespace
                                        to reference a secret resource.
                                      type: string
                                    namespace:
                                      description: namespace defines the space within
                                        which the secret name must be unique.
                                      type: string
                                  type: object
                                  x-kubernetes-map-type: atomic
                                body:
                                  description: Body is the request body, templated
                                    the same way as URL. Empty for GET/DELETE.
                                  type: string
                                expectStatus:
                                  description: |-
                                    ExpectStatus, if set, is the exact HTTP status code that counts as success.
                                    If unset, any 2xx response counts as success.
                                  type: integer
                                headers:
                                  description: |-
                                    Headers are sent with the request, in order. Each is either a static (still templated)
                                    Value or sourced directly from a Secret via ValueFrom.
                                  items:
                                    description: |-
                                      WebhookHeader is one HTTP header for a WebhookAction. Exactly one of Value or ValueFrom
                                      must be set.
                                    properties:
                                      name:
                                        type: string
                                      value:
                                        description: Value is a static header value,
                                          templated the same way as URL/Body.
                                        type: string
                                      valueFrom:
                                        description: |-
                                          ValueFrom sources this header's value directly from a Secret key. Never templated —
                                          unlike Value, it goes straight from Secret.Data[key] to the HTTP request, so a
                                          credential can't leak into a body/URL that gets logged on failure.
                                        properties:
                                          key:
                                            description: The key of the secret to
                                              select from.  Must be a valid secret
                                              key.
                                            type: string
                                          name:
                                            default: ""
                                            description: |-
                                              Name of the referent.
                                              This field is effectively required, but due to backwards compatibility is
                                              allowed to be empty. Instances of this type with an empty value here are
                                              almost certainly wrong.
                                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                            type: string
                                          optional:
                                            description: Specify whether the Secret
                                              or its key must be defined
                                            type: boolean
                                        required:
                                        - key
                                        type: object
                                        x-kubernetes-map-type: atomic
                                    required:
                                    - name
                                    type: object
                                    x-kubernetes-validations:
                                    - message: exactly one of value or valueFrom must
                                        be specified
                                      rule: '(has(self.value) ? 1 : 0) + (has(self.valueFrom)
                                        ? 1 : 0) == 1'
                                  type: array
                                method:
                                  description: Method defaults to POST if empty.
                                  enum:
                                  - GET
                                  - POST
                                  - PUT
                                  - PATCH
                                  - DELETE
                                  type: string
                                timeout:
                                  description: |-
                                    Timeout in seconds for this call. Defaults to 30 if unset. Matches the existing
                                    container-task Action.Timeout int64-seconds convention, not metav1.Duration.
                                  format: int64
                                  type: integer
                                url:
                                  description: |-
                                    URL is the target of the HTTP request. Supports the same Go-template/sprig syntax
                                    as bmc.VirtualMediaAction.MediaURL (see templateActions), e.g.
                                    "https://inventory.example.com/hosts/{{ (index .Hardware.Interfaces 0).DHCP.MAC }}/provisioning-started".
                                  type: string
                              required:
                              - url
                              type: object
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of powerAction, bootDevice, virtualMediaAction,
                              oneTimeBootDeviceAction, or webhook must be specified
                            rule: '(has(self.powerAction) ? 1 : 0) + (has(self.oneTimeBootDeviceAction)
                              ? 1 : 0) + (has(self.bootDevice) ? 1 : 0) + (has(self.virtualMediaAction)
                              ? 1 : 0) + (has(self.webhook) ? 1 : 0) == 1'
                        maxItems: 50
                        type: array
                    type: object
                  isoURL:
                    description: |-
                      ISOURL is the URL of the ISO that will be one-time booted. When this field is set,
                      the controller will create a job.bmc.tinkerbell.org object
                      for getting the associated hardware into a CDROM booting state.
                      A HardwareRef that contains a spec.BmcRef must be provided.
                      BootMode must be set to "isoboot".
                    format: uri
                    type: string
                  toggleAllowNetboot:
                    description: |-
                      ToggleAllowNetboot indicates whether the controller should toggle the field in the associated hardware for allowing PXE booting.
                      This will be enabled before a Workflow is executed and disabled after the Workflow has completed successfully.
                      A HardwareRef must be provided.
                    type: boolean
                type: object
              disabled:
                description: Disabled indicates whether the Workflow will be processed
                  or not.
                type: boolean
              hardwareMap:
                additionalProperties:
                  type: string
                description: A mapping of template devices to hardware mac addresses.
                type: object
              hardwareRef:
                description: Name of the Hardware associated with this workflow.
                type: string
              templateRef:
                description: Name of the Template associated with this workflow.
                type: string
            type: object
          status:
            description: WorkflowStatus defines the observed state of a Workflow.
            properties:
              agentID:
                description: AgentID is the ID of the Agent with which this Workflow
                  is associated.
                type: string
              bootOptions:
                description: BootOptions holds the state of any boot options.
                properties:
                  actions:
                    additionalProperties:
                      description: ActionListStatus holds progress through an ordered
                        PreparingActions/PostActions list.
                      properties:
                        completed:
                          description: |-
                            Completed is the number of entries in the list that have fully succeeded, in order.
                            The entry at index Completed is the one currently in flight (if any). The batch Job
                            name for an in-flight BMC-action run is always derivable as "<phase>-<workflow>-
                            <Completed>" — it isn't tracked separately here.
                          type: integer
                      type: object
                    description: |-
                      Actions tracks per-phase progress through PreparingActions/PostActions,
                      e.g. "customboot-preparing".
                    type: object
                  allowNetboot:
                    description: AllowNetboot holds the state of the the controller's
                      interactions with the allowPXE field in a Hardware object.
                    properties:
                      toggledFalse:
                        type: boolean
                      toggledTrue:
                        type: boolean
                    type: object
                  jobs:
                    additionalProperties:
                      description: JobStatus holds the state of a specific job.bmc.tinkerbell.org
                        object created.
                      properties:
                        complete:
                          description: Complete indicates whether the created job.bmc.tinkerbell.org
                            has reported its conditions as complete.
                          type: boolean
                        existingJobDeleted:
                          description: |-
                            ExistingJobDeleted indicates whether any existing job.bmc.tinkerbell.org was deleted.
                            The name of each job.bmc.tinkerbell.org object created by the controller is the same, so only one can exist at a time.
                            Using the same name was chosen so that there is only ever 1 job.bmc.tinkerbell.org per Hardware/Machine.bmc.tinkerbell.org.
                            This makes clean up easier and we dont just orphan jobs every time.
                          type: boolean
                        uid:
                          description: |-
                            UID is the UID of the job.bmc.tinkerbell.org object associated with this workflow.
                            This is used to uniquely identify the job.bmc.tinkerbell.org object, as
                            all objects for a specific Hardware/Machine.bmc.tinkerbell.org are created with the same name.
                          type: string
                      type: object
                    description: Jobs holds the state of any job.bmc.tinkerbell.org
                      objects created.
                    type: object
                type: object
              conditions:
                description: Conditions are the latest available observations of an
                  object's current state.
                items:
                  description: JobCondition describes current state of a job.
                  properties:
                    message:
                      description: Message is a human readable message indicating
                        details about last transition.
                      type: string
                    reason:
                      description: Reason is a (brief) reason for the condition's
                        last transition.
                      type: string
                    status:
                      description: Status of the condition, one of True, False, Unknown.
                      type: string
                    time:
                      description: Time when the condition was created.
                      format: date-time
                      type: string
                    type:
                      description: Type of job condition, Complete or Failed.
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              currentState:
                description: CurrentState tracks where the workflow is in its execution.
                properties:
                  actionID:
                    type: string
                  actionName:
                    type: string
                  agentID:
                    type: string
                  state:
                    type: string
                  taskID:
                    type: string
                  taskName:
                    type: string
                type: object
              globalExecutionStop:
                description: |-
                  GlobalExecutionStop represents the time when the Workflow should stop executing.
                  After this time, the Workflow will be marked as TIMEOUT.
                format: date-time
                type: string
              globalTimeout:
                description: GlobalTimeout represents the max execution time.
                format: int64
                type: integer
              state:
                description: State is the current overall state of the Workflow.
                type: string
              tasks:
                description: Tasks are the tasks to be run by the Agent(s).
                items:
                  description: Task represents a series of actions to be completed
                    by an Agent.
                  properties:
                    actions:
                      items:
                        description: Action represents a workflow action.
                        properties:
                          command:
                            items:
                              type: string
                            type: array
                          environment:
                            additionalProperties:
                              type: string
                            type: object
                          executionDuration:
                            type: string
                          executionStart:
                            format: date-time
                            type: string
                          executionStop:
                            format: date-time
                            type: string
                          id:
                            type: string
                          image:
                            type: string
                          message:
                            type: string
                          name:
                            type: string
                          pid:
                            type: string
                          state:
                            type: string
                          timeout:
                            format: int64
                            type: integer
                          volumes:
                            items:
                              type: string
                            type: array
                        required:
                        - id
                        type: object
                      type: array
                    agentID:
                      type: string
                    environment:
                      additionalProperties:
                        type: string
                      type: object
                    id:
                      type: string
                    name:
                      type: string
                    volumes:
                      items:
                        type: string
                      type: array
                  required:
                  - actions
                  - agentID
                  - id
                  - name
                  type: object
                type: array
              templateRendering:
                description: |-
                  TemplateRendering indicates whether the template was rendered successfully.
                  Possible values are "successful" or "failed" or "unknown".
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
