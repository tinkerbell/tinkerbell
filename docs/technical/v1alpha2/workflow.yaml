---
apiVersion: tinkerbell.org/v1alpha2
kind: Workflow
metadata:
  name: example
  namespace: tinkerbell
  annotations:
    tinkerbell.org/disabled: "waiting for hardware readiness"
spec:
  globals:
    envVars:
      - key: globalOne
        value: "1"
    templateMap:
      "globalKey": "value"
    volumes:
      - "/etc/data2:/data2:ro"
  timeoutSeconds: 600
  tasks:
    - agentID: "1234"
      extra:
        envVars:
          - key: workflowOne
            value: "1"
        templateMap:
          "workflowKey": "value"
        volumes:
          - "/etc/data3:/data4:ro"
      hardware:
        #bmcRef:
        #  name: "example"
        #  namespace: "tinkerbell"
        bootOptions:
          toggleNetboot: true
          #isoURL: "https://tinkerbell.org/iso/00-01-02-03-04-05/hook.iso"
          bootMode: customboot
          customboot:
            preOperations:
              - powerAction: "off"
              - bootDevice:
                  device: "pxe"
                  efiBoot: true
              - powerAction: "on"
            postOperations:
              - bootDevice:
                  device: "disk"
                  persistent: true
                  efiBoot: true
              - powerAction: "reset"
        hardwareRef:
          name: "example"
          namespace: "tinkerbell"
      timeoutSeconds: 600
      taskRef:
        name: "example"
        namespace: "tinkerbell"
