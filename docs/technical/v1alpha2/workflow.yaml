---
apiVersion: tinkerbell.org/v1alpha2
kind: Workflow
metadata:
  name: example
  namespace: tinkerbell
  annotations:
    tinkerbell.org/disabled: "waiting for hardware readiness"
spec:
  # Disabled pauses the Workflow without deleting it. The tinkerbell.org/disabled
  # annotation above is an optional human-readable reason for the pause.
  disabled: true
  globals:
    env:
      globalOne: "1"
    templateMap:
      "globalKey": "value"
      "artifactServer": "{{ .references.mysecret.data.datacenterSpecificURL | b64dec }}"
    volumes:
      - "/etc/data2:/data2:ro"
  # References can be used in Workflow templating. They fetch external objects
  # (Secrets, ConfigMaps, etc.) and expose their data under `.references.<name>`.
  references:
    "mysecret":
      name: "secret01"
      namespace: "tinkerbell"
      resource: "secrets"
      version: "v1"
  timeoutSeconds: 600
  tasks:
    - agentID: "1234"
      extra:
        env:
          workflowOne: "1"
        templateMap:
          "workflowKey": "value"
        volumes:
          - "/etc/data3:/data4:ro"
      hardware:
        #bmcRef:
        #  name: "example"
        #  namespace: "tinkerbell"
        bootOptions:
          toggleNetboot: true
          #isoURL: "https://tinkerbell.org/iso/00-01-02-03-04-05/captain.iso"
          #isoURL can be templated, for example:
          #isoURL: 'https://tinkerbell.org/iso/{{ keys .hardware.spec.networkInterfaces | sortAlpha | first | replace ":" "-" }}/captain.iso'
          bootMode: customboot
          customboot:
            preOperations:
              - powerAction: "off"
                timeoutSeconds: 30
              - virtualMediaAction:
                  mediaURL: "https://example.com/captain.iso"
                  kind: "CD"
                timeoutSeconds: 60
              - bootDevice:
                  device: "cdrom" # pxe, disk, bios, cdrom, safe
                  persistent: false
                  efiBoot: true
              - powerAction: "on" # on, off, soft, status, cycle, reset
            postOperations:
              - powerAction: "off"
              - virtualMediaAction:
                  mediaURL: "" # empty to eject media
                  kind: "CD"
              - bootDevice:
                  device: "disk"
                  persistent: true
                  efiBoot: true
              - powerAction: "cycle" # on, off, soft, status, cycle, reset
        hardwareRef:
          name: "example"
          namespace: "tinkerbell"
      timeoutSeconds: 600
      taskRef:
        name: "example"
        namespace: "tinkerbell"
