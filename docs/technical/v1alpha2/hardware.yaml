---
apiVersion: tinkerbell.org/v1alpha2
kind: Hardware
metadata:
  name: example
  namespace: tinkerbell
  annotations:
    tinkerbell.org/disabled: "hardware is under maintenance"
spec:
  agentID: "1234"
  auto:
    enrollmentEnabled: false
  attributes:
    arch: "x86_64"
    uefi: true
  instance:
    lookupID: "a8f3e2b1-9c4d-4e5f-b6a7-8d9e0f1a2b3c"
    metadata: |
      instance-id: iid-local01
      local-hostname: my-nocloud-vm
      hostname: my-nocloud-vm
      cloud-name: nocloud
    networkConfig: |
      network:
        version: 2
        ethernets:
          eth0:
            addresses:
              - {{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.address }}/{{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.prefix }}
            routes:
              - to: default
                via: {{ (index .hardware.networkInterfaces "52:54:00:41:05:c6").ipam.ipv4.gateway }}
            nameservers:
              addresses:
                - 8.8.8.8
                - 8.8.4.4
            dhcp4: false
    osie:
      initrdURL: "http://192.168.3.4:8080/my-custominitrd"
      isoURL: "https://github.com/tinkerbell/hook/releases/download/v0.11.1/hook-latest-lts-x86_64-efi-initrd.iso"
      kernelParams:
        - "console=ttyS2"
      kernelURL: "http://192.168.3.4:8080/my-custom-vmlinuz"
    sshKeys:
      - "ssh-rsa AAAAB3NzaC1yc2E..."
    userdata: |
      #cloud-config
      users:
        - name: clouduser
          sudo: ALL=(ALL) NOPASSWD:ALL
          ssh_authorized_keys:
            - {{ .hardware.instance.sshKeys[0] }}
      
      write_files:
        - path: /etc/docker/certs.d/registry.example.com/ca.crt
          permissions: '0644'
          content: |
            {{ .references.registryCert.data.ca\.crt | b64dec | nindent 12 }}
      runcmd:
        - echo "Hello from cloud-init!" > /home/clouduser/greeting.txt
        - apt update
    vendordata: |
      #cloud-config
      vendor_data:
        enabled: true
        # Example: Define a custom script to run
        runcmd:
          - echo "Vendor-specific script executed!" > /var/log/vendor-script.log
          - apt-get update -y
          - apt-get install -y some-vendor-package
        # Example: Inject a file
        write_files:
          - path: /etc/vendor-config.conf
            permissions: '0644'
            content: |
              # Vendor specific configuration
              VENDOR_SETTING=true
              VENDOR_ID="my-provider-123"
  networkInterfaces:
    "52:54:00:41:05:c6":
      dhcp:
        ipv4:
          disabled: false
          bootFileName: "ztp.json"
          classlessStaticRoutes:
            - destinationDescriptor: "192.168.1.0/24"
              router: "192.168.1.254"
          domainName: "tinkerbell.org"
          domainSearchList:
            - "tinkerbell.org"
            - "example.com"
          hostname: "example"
          leaseTimeSeconds: 86400
          nameservers:
            - "1.1.1.1"
          ntpServers:
            - "pool.ntp.org"
            - "204.197.163.71"
          tftpServerName: "192.168.2.2"
          vlanID: "110"
        ipv6:
          disabled: false
          nameservers:
            - "2001:4860:4860::8888"
            - "2001:4860:4860::8844"
          domainSearchList:
            - "tinkerbell.org"
          ntpServers:
            - "2001:db8::123"
          informationRefreshTime: 86400
          preferredLifetime: 3600
          validLifetime: 7200
          bootFileURL: "tftp://[2001:db8::1]/bootx64.efi"
          bootFileParams:
            - "root=/dev/sda1"
      ipam:
        ipv4:
          address: "192.168.1.100"
          gateway: "192.168.1.1"
          prefix: "24"
        ipv6:
          address: "2001:db8:1:1::"
          gateway: "fe80::1"
          prefix: "64"
      netboot:
        disabled: false
        ipxe:
          binary: "snp-x86_64.efi"
          script: |
            #!ipxe
            dhcp
            chain --autofree https://boot.netboot.xyz
          # url: "https://boot.netboot.xyz"
        pxelinux:
          config: |
            DEFAULT linux
            LABEL linux
              KERNEL http://example.com/vmlinuz
              APPEND initrd=http://example.com/initrd.img console=ttyS2
        rpi:
          serialNum: "9ffefdef"
          configTxt: |
            sha256=0
            uart_2ndstage=1
            gpu_mem=16
            kernel=kernel8.img
            initramfs initramfs8 followkernel
            cmdline=cmdline.txt
            arm_64bit=1
            arm_boost=1
            enable_uart=1
            dtoverlay=disable-bt
            dtoverlay=disable-wifi
            avoid_warnings=2
            dtoverlay=vc4-kms-v3d,noaudio
            [pi4]
            gpu_mem=64
            dtoverlay=vc4-kms-v3d-pi4,noaudio
            [pi5]
            dtoverlay=vc4-kms-v3d-pi5,noaudio
            [all]
            hdmi_safe=1
          firmwarePath: "captain-armbian-rpi/firmware-rpi"
  references:
    additional:
      "registryCert":
        group: ""
        name: "registry-ca-cert"
        namespace: "tinkerbell"
        resource: "secrets"
        version: "v1"
    builtin:
      bmc:
        name: "example"
        namespace: "tinkerbell"
  storageDevices:
    - name: "/dev/sda"